<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Round Table Dish Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        // Inline simple icons to replace lucide-react dependencies safely in a single file
        const RotateCw = () => <span>🔃</span>;
        const RotateCcw = () => <span>🔄</span>;
        const Shuffle = () => <span>🔀</span>;
        const Info = () => <span>ℹ️</span>;
        const CheckCircle2 = () => <span>✅</span>;
        const AlertTriangle = () => <span>⚠️</span>;
        const Settings2 = () => <span>⚙️</span>;
        const BookOpen = () => <span>📖</span>;
        const Sparkles = () => <span>✨</span>;
        const RefreshCw = () => <span>⏳</span>;

        const FOOD_DATABASE = [
          { id: 0, label: 'A', letter: 'a', name: 'Pizza', emoji: '🍕' },
          { id: 1, label: 'B', letter: 'b', name: 'Burger', emoji: '🍔' },
          { id: 2, label: 'C', letter: 'c', name: 'Sushi', emoji: '🍣' },
          { id: 3, label: 'D', letter: 'd', name: 'Taco', emoji: '🌮' },
          { id: 4, label: 'E', letter: 'e', name: 'Ramen', emoji: '🍜' },
          { id: 5, label: 'F', letter: 'f', name: 'Salad', emoji: '🥗' },
          { id: 6, label: 'G', letter: 'g', name: 'Cake', emoji: '🍰' },
          { id: 7, label: 'H', letter: 'h', name: 'Donut', emoji: '🍩' },
          { id: 8, label: 'I', letter: 'i', name: 'Curry', emoji: '🍛' },
          { id: 9, label: 'J', letter: 'j', name: 'Shrimp', emoji: '🍤' }
        ];

        function App() {
          const { useState, useEffect, useMemo } = React;
          const [n, setN] = useState(5);
          const [dishes, setDishes] = useState([1, 2, 3, 4, 0]); 
          const [rotation, setRotation] = useState(0);
          const [isEditing, setIsEditing] = useState(false);
          const [activeTab, setActiveTab] = useState('interactive'); 

          const generateDerangement = (size) => {
            let arr = Array.from({ length: size }, (_, i) => i);
            let attempts = 0;
            while (attempts < 1000) {
              for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
              }
              let isDerang = true;
              for (let i = 0; i < size; i++) {
                if (arr[i] === i) { isDerang = false; break; }
              }
              if (isDerang) return arr;
              attempts++;
            }
            return Array.from({ length: size }, (_, i) => (i + 1) % size);
          };

          const handleNChange = (newN) => {
            setN(newN);
            setDishes(generateDerangement(newN));
            setRotation(0);
          };

          const handleShuffle = () => {
            setDishes(generateDerangement(n));
            setRotation(0);
          };

          const isLoaded = dishes && dishes.length === n;

          const isInitialDerangement = useMemo(() => {
            if (!isLoaded) return false;
            for (let i = 0; i < n; i++) { if (dishes[i] === i) return false; }
            return true;
          }, [dishes, n, isLoaded]);

          const currentDishes = useMemo(() => {
            if (!isLoaded) return [];
            let arr = [];
            for (let i = 0; i < n; i++) {
              const initialIndex = (i - rotation + n) % n;
              arr.push(dishes[initialIndex]);
            }
            return arr;
          }, [dishes, rotation, n, isLoaded]);

          const matches = useMemo(() => {
            if (!isLoaded) return [];
            let list = [];
            for (let i = 0; i < n; i++) { if (currentDishes[i] === i) list.push(i); }
            return list;
          }, [currentDishes, n, isLoaded]);

          const requiredRotations = useMemo(() => {
            if (!isLoaded) return {};
            let map = {};
            for (let j = 0; j < n; j++) {
              const p = dishes.indexOf(j);
              if (p !== -1) { map[j] = (j - p + n) % n; }
            }
            return map;
          }, [dishes, n, isLoaded]);

          const rotationFrequencies = useMemo(() => {
            if (!isLoaded) return [];
            let freq = Array(n).fill(0);
            Object.values(requiredRotations).forEach(k => { if (k < n) freq[k]++; });
            return freq;
          }, [requiredRotations, n, isLoaded]);

          const winningRotations = useMemo(() => {
            if (!isLoaded) return [];
            let wins = [];
            rotationFrequencies.forEach((count, k) => { if (count >= 2) wins.push({ rotation: k, count }); });
            return wins;
          }, [rotationFrequencies, isLoaded]);

          const handleManualDishChange = (posIndex, targetDishId) => {
            const newDishes = [...dishes];
            const existingPos = newDishes.indexOf(targetDishId);
            if (existingPos !== -1) { newDishes[existingPos] = newDishes[posIndex]; }
            newDishes[posIndex] = targetDishId;
            setDishes(newDishes);
            setRotation(0);
          };

          if (!isLoaded) return <div className="p-8 text-center"><RefreshCw /> Loading...</div>;

          return (
            <div className="flex flex-col min-h-screen">
              <header className="border-b border-slate-800 bg-slate-900/50 px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-3">
                  <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><RotateCw /></div>
                  <div>
                    <h1 className="text-xl font-bold tracking-tight">The Round Table Dish Puzzle</h1>
                    <p className="text-xs text-slate-400">An interactive explore tool for the Pigeonhole Principle</p>
                  </div>
                </div>
                <div className="flex flex-wrap items-center gap-3">
                  <div className="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 text-xs">
                    <Settings2 /> <span>Guests (n):</span>
                    <input type="range" min="3" max="10" value={n} onChange={(e) => handleNChange(parseInt(e.target.value))} className="w-24 accent-indigo-500 cursor-pointer"/>
                    <span className="text-sm font-bold text-indigo-400 w-5 text-center">{n}</span>
                  </div>
                  <button onClick={handleShuffle} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-all active:scale-95">
                    <Shuffle /> Shuffle Derangement
                  </button>
                </div>
              </header>

              <main className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 p-6">
                <div className="lg:col-span-7 flex flex-col bg-slate-900/40 rounded-2xl border border-slate-800 p-5 relative">
                  <div className="flex items-center justify-between mb-4 z-10">
                    <div className="flex gap-1 bg-slate-950 p-1 rounded-xl border border-slate-800 text-xs">
                      <button onClick={() => setActiveTab('interactive')} className={`px-3 py-1.5 rounded-lg ${activeTab === 'interactive' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Interactive Table</button>
                      <button onClick={() => setActiveTab('pigeonhole')} className={`px-3 py-1.5 rounded-lg ${activeTab === 'pigeonhole' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Pigeonholes Map</button>
                      <button onClick={() => setActiveTab('proof')} className={`px-3 py-1.5 rounded-lg ${activeTab === 'proof' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>Formal Proof</button>
                    </div>
                    <button onClick={() => setIsEditing(!isEditing)} className={`px-2.5 py-1 rounded-lg text-xs font-medium border ${isEditing ? 'bg-amber-500/20 text-amber-300 border-amber-500/50' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                      {isEditing ? "Exit Edit Mode 🛠️" : "Edit Initial Setup"}
                    </button>
                  </div>

                  {!isInitialDerangement && (
                    <div className="mb-4 bg-amber-950/40 border border-amber-800/50 text-amber-200 px-4 py-2 rounded-xl flex items-start gap-2 text-xs">
                      <AlertTriangle /> <span><strong>Warning:</strong> Not a derangement. Setup needs everyone with an incorrect plate for the theorem math to hold.</span>
                    </div>
                  )}

                  <div className="flex-1 flex flex-col items-center justify-center min-h-[400px] relative">
                    {activeTab === 'interactive' && (
                      <>
                        <div className="absolute bottom-2 flex justify-center items-center gap-4 bg-slate-950/80 p-2 rounded-xl border border-slate-800 w-64">
                          <button onClick={() => setRotation((prev) => (prev - 1 + n) % n)} className="p-1 text-slate-400 hover:text-white"><RotateCcw /></button>
                          <span className="text-xs font-bold text-slate-300">Rotation: +{rotation}</span>
                          <button onClick={() => setRotation((prev) => (prev + 1) % n)} className="p-1 text-slate-400 hover:text-white"><RotateCw /></button>
                        </div>

                        <div className="relative w-full max-w-[360px] aspect-square">
                          <svg viewBox="0 0 400 400" className="w-full h-full select-none">
                            <circle cx="200" cy="200" r="130" className="fill-slate-900 stroke-slate-800 stroke-2" />
                            <g style={{ transform: `rotate(${(rotation * 360) / n}deg)`, transformOrigin: '200px 200px', transition: 'transform 0.4s ease' }}>
                              <circle cx="200" cy="200" r="100" className="fill-slate-800/40 stroke-slate-700" />
                              {Array.from({ length: n }).map((_, i) => {
                                const angle = (i * 2 * Math.PI) / n - Math.PI / 2;
                                const cx = 200 + 68 * Math.cos(angle);
                                const cy = 200 + 68 * Math.sin(angle);
                                const food = FOOD_DATABASE[dishes[i]] || { emoji: '🍽️', letter: '?' };
                                const isCorrectNow = dishes[i] === (i + rotation) % n;
                                return (
                                  <g key={i}>
                                    <circle cx={cx} cy={cy} r="20" className={isCorrectNow ? 'fill-emerald-500/20 stroke-emerald-400 stroke-2' : 'fill-slate-900 stroke-slate-600/50'} />
                                    <text x={cx} y={cy + 5} textAnchor="middle" fontSize="16">{food.emoji}</text>
                                  </g>
                                );
                              })}
                            </g>
                            {Array.from({ length: n }).map((_, i) => {
                              const angle = (i * 2 * Math.PI) / n - Math.PI / 2;
                              const cx = 200 + 155 * Math.cos(angle);
                              const cy = 200 + 155 * Math.sin(angle);
                              const person = FOOD_DATABASE[i] || { label: '?' };
                              const isHappy = matches.includes(i);
                              return (
                                <g transform={`translate(${cx - 22}, ${cy - 22})`} key={i}>
                                  <rect width="44" height="44" rx="8" className={isHappy ? 'fill-emerald-950 stroke-emerald-500 stroke-2' : 'fill-slate-900 stroke-slate-800'} />
                                  <text x="22" y="20" textAnchor="middle" className="text-xs font-bold fill-white">{person.label}</text>
                                  <text x="22" y="34" textAnchor="middle" fontSize="8" className="fill-slate-400">{isHappy ? "😊 Match!" : `wants ${person.letter}`}</text>
                                </g>
                              );
                            })}
                          </svg>
                        </div>
                      </>
                    )}

                    {activeTab === 'pigeonhole' && (
                      <div className="w-full space-y-4">
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                          {Array.from({ length: n - 1 }).map((_, idx) => {
                            const holeRotation = idx + 1;
                            const sittingDishes = Object.keys(requiredRotations)
                              .filter(dId => requiredRotations[dId] === holeRotation)
                              .map(dId => FOOD_DATABASE[parseInt(dId)])
                              .filter(Boolean);
                            return (
                              <div key={idx} className={`p-3 rounded-xl border text-center ${sittingDishes.length >= 2 ? 'bg-indigo-950/40 border-indigo-500' : 'bg-slate-900 border-slate-800'}`}>
                                <div className="text-[10px] uppercase text-slate-400 font-bold">Rotation +{holeRotation}</div>
                                <div className="flex justify-center gap-1 my-2">
                                  {sittingDishes.map(f => <span key={f.id} title={f.name}>{f.emoji}</span>)}
                                </div>
                                <div className="text-xs text-slate-400">{sittingDishes.length} items</div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {activeTab === 'proof' && (
                      <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-sm space-y-2">
                        <h3 className="font-bold text-indigo-400 flex items-center gap-1"><BookOpen /> Pigeonhole Principle Proof</h3>
                        <p>Let n be the number of guests. Because it starts as a derangement, rotation 0 provides 0 correct dishes.</p>
                        <p>This means all n dishes (the pigeons) require some rotation step k belonging to {"{1, 2, ..., n-1}"} to find their owners.</p>
                        <p className="bg-indigo-900/20 p-2 rounded text-indigo-300">Since there are n dishes but only n-1 unique rotation holes available, at least one rotation hole must hold 2 or more dishes.</p>
                      </div>
                    )}
                  </div>
                </div>

                <div className="lg:col-span-5 flex flex-col gap-4">
                  <div className="bg-slate-900/40 border border-slate-800 rounded-2xl p-4">
                    <h2 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 flex items-center gap-1"><CheckCircle2 /> Live Dashboard</h2>
                    <div className="grid grid-cols-2 gap-2 text-center">
                      <div className="bg-slate-950 p-2 rounded-xl border border-slate-800">
                        <span className="text-[10px] text-slate-400 block">Matches right now</span>
                        <span className={`text-xl font-bold ${matches.length >= 2 ? 'text-emerald-400' : 'text-rose-400'}`}>{matches.length}</span>
                      </div>
                      <div className="bg-slate-950 p-2 rounded-xl border border-slate-800">
                        <span className="text-[10px] text-slate-400 block">Initial State</span>
                        <span className="text-sm font-bold text-indigo-400 block mt-1">{isInitialDerangement ? 'Deranged' : 'Standard'}</span>
                      </div>
                    </div>
                  </div>

                  <div className="bg-slate-900/40 border border-slate-800 rounded-2xl p-4 flex-1">
                    <h2 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">Table Setup Manager</h2>
                    <div className="space-y-1.5 max-h-[260px] overflow-y-auto">
                      {Array.from({ length: n }).map((_, i) => {
                        const guest = FOOD_DATABASE[i] || { label: '?' };
                        const currentDishId = currentDishes[i];
                        const currentFood = FOOD_DATABASE[currentDishId] || { emoji: '🍽️', letter: '?' };
                        return (
                          <div key={i} className="p-2 bg-slate-950 rounded-lg border border-slate-800 flex justify-between items-center text-xs">
                            <span>Guest <strong>{guest.label}</strong> (wants {guest.letter})</span>
                            {isEditing ? (
                              <select value={dishes[i]} onChange={(e) => handleManualDishChange(i, parseInt(e.target.value))} className="bg-slate-900 border border-slate-700 text-white rounded px-1">
                                {Array.from({ length: n }).map((_, dIdx) => <option key={dIdx} value={dIdx}>{FOOD_DATABASE[dIdx].emoji} {FOOD_DATABASE[dIdx].letter}</option>)}
                              </select>
                            ) : (
                              <span className="font-bold text-indigo-300">{currentFood.emoji} {currentFood.letter}</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = ReactRoot = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
